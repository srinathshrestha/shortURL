<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LinkVerse</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-form">
      <h1>LinkVerse</h1>
      <div class="tabs">
        <a href="#" id="tab-login" class="active">Sign in</a>
        <a href="#" id="tab-register">Create account</a>
      </div>

      <form id="login-form">
        <div class="field">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" required placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="field">
          <label for="login-password">Password</label>
          <div class="password-wrap">
            <input type="password" id="login-password" required autocomplete="current-password">
            <button type="button" class="password-toggle" id="login-password-toggle" aria-label="Show password">Show</button>
          </div>
        </div>
        <div id="login-error" class="form-error" aria-live="polite"></div>
        <button type="submit" class="btn">Sign in</button>
      </form>

      <form id="register-form" style="display: none;">
        <div class="field">
          <label for="register-email">Email</label>
          <input type="email" id="register-email" required placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="field">
          <label for="register-password">Password</label>
          <div class="password-wrap">
            <input type="password" id="register-password" required minlength="8" autocomplete="new-password" placeholder="Min 8 characters">
            <button type="button" class="password-toggle" id="register-password-toggle" aria-label="Show password">Show</button>
          </div>
        </div>
        <div class="field">
          <label for="register-confirm">Confirm password</label>
          <div class="password-wrap">
            <input type="password" id="register-confirm" required autocomplete="new-password">
            <button type="button" class="password-toggle" id="register-confirm-toggle" aria-label="Show password">Show</button>
          </div>
        </div>
        <div id="register-error" class="form-error" aria-live="polite"></div>
        <button type="submit" class="btn">Create account</button>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    if (guardPage()) initAuthForms();
  </script>
</body>
</html>
