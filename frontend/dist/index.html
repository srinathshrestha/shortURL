<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LinkVerse</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="css/app.css">
</head>
<body class="d-flex align-items-center justify-content-center vh-100 bg-body">
  <div class="card shadow border-0" style="width: 100%; max-width: 400px;">
    <div class="card-body p-4 p-md-5">
      <h1 class="h4 mb-4 font-monospace text-center">LinkVerse</h1>
      
      <ul class="nav nav-pills nav-fill mb-4" id="auth-tabs">
        <li class="nav-item">
          <a href="#" class="nav-link active" id="tab-login">Sign in</a>
        </li>
        <li class="nav-item">
          <a href="#" class="nav-link" id="tab-register">Create account</a>
        </li>
      </ul>

      <form id="login-form">
        <div class="mb-3">
          <label for="login-email" class="form-label text-secondary small">Email</label>
          <input type="email" id="login-email" class="form-control" required placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="mb-4">
          <label for="login-password" class="form-label text-secondary small">Password</label>
          <div class="input-group">
            <input type="password" id="login-password" class="form-control" required autocomplete="current-password">
            <button class="btn btn-outline-secondary" type="button" id="login-password-toggle">Show</button>
          </div>
        </div>
        <div id="login-error" class="text-danger small mb-3" aria-live="polite"></div>
        <button type="submit" class="btn btn-primary w-100">Sign in</button>
      </form>

      <form id="register-form" style="display: none;">
        <div class="mb-3">
          <label for="register-email" class="form-label text-secondary small">Email</label>
          <input type="email" id="register-email" class="form-control" required placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="mb-3">
          <label for="register-password" class="form-label text-secondary small">Password</label>
          <div class="input-group">
            <input type="password" id="register-password" class="form-control" required minlength="8" autocomplete="new-password" placeholder="Min 8 characters">
            <button class="btn btn-outline-secondary" type="button" id="register-password-toggle">Show</button>
          </div>
        </div>
        <div class="mb-4">
          <label for="register-confirm" class="form-label text-secondary small">Confirm password</label>
          <div class="input-group">
            <input type="password" id="register-confirm" class="form-control" required autocomplete="new-password">
            <button class="btn btn-outline-secondary" type="button" id="register-confirm-toggle">Show</button>
          </div>
        </div>
        <div id="register-error" class="text-danger small mb-3" aria-live="polite"></div>
        <button type="submit" class="btn btn-primary w-100">Create account</button>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    if (guardPage()) initAuthForms();
  </script>
</body>
</html>
