<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LinkVerse Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="css/app.css">
</head>
<body class="d-flex flex-column vh-100 bg-body">
  <nav class="navbar navbar-expand border-bottom shadow-sm">
    <div class="container-fluid px-3 px-md-4">
      <span class="navbar-brand font-monospace mb-0 h1">linkverse</span>
      <div class="d-flex align-items-center gap-3">
        <span class="text-secondary small d-none d-sm-inline" id="header-email"></span>
        <a href="#" id="logout-btn" class="text-decoration-none link-secondary">Sign out</a>
      </div>
    </div>
  </nav>

  <div class="container-fluid flex-grow-1 overflow-hidden p-0">
    <div class="row h-100 g-0">
      <!-- Sidebar / Links Panel -->
      <aside class="col-12 col-md-4 col-lg-3 border-end p-0 d-flex flex-column bg-body-tertiary h-100">
        <form class="p-3 border-bottom d-flex flex-column gap-2" id="short-form">
          <input type="url" id="new-link-url" class="form-control" placeholder="https://example.com" required>
          <div class="input-group">
            <input type="text" id="new-link-title" class="form-control" placeholder="Title (optional)">
            <button class="btn btn-primary" type="submit">Shorten</button>
          </div>
        </form>
        <div class="flex-grow-1 overflow-y-auto w-100">
          <div class="list-group list-group-flush" id="links-list"></div>
        </div>
      </aside>

      <!-- Main Analytics Panel -->
      <main class="col-12 col-md-8 col-lg-9 p-3 p-md-5 overflow-y-auto h-100">
        <div id="analytics-empty" class="d-flex align-items-center justify-content-center h-100 text-secondary">
          <p class="fs-5">Select a link to view analytics</p>
        </div>
        
        <div id="analytics-loaded" class="d-none">
          <div id="analytics-error" class="alert alert-danger d-none"></div>
          
          <div class="d-flex flex-column flex-sm-row justify-content-between align-items-sm-center mb-4 gap-3">
            <h2 class="h3 font-monospace mb-0 text-break" id="analytics-slug"></h2>
            <div class="btn-group btn-group-sm" id="day-toggles" role="group">
              <!-- Replaced via JS -->
            </div>
          </div>

          <div class="row g-3 g-xl-4 mb-4 mb-xl-5" id="summary-row">
            <!-- Replaced via JS -->
          </div>
          
          <div class="row g-3 g-xl-4">
            <div class="col-12">
              <div class="card bg-body-tertiary border-0 shadow-sm h-100">
                <div class="card-body">
                  <h6 class="card-subtitle mb-3 text-muted text-uppercase" style="letter-spacing: 0.05em">Clicks by day</h6>
                  <canvas id="chart-by-day" class="w-100" height="200"></canvas>
                </div>
              </div>
            </div>
            
            <div class="col-12 col-xl-6">
              <div class="card bg-body-tertiary border-0 shadow-sm h-100">
                <div class="card-body">
                  <h6 class="card-subtitle mb-3 text-muted text-uppercase" style="letter-spacing: 0.05em">By country</h6>
                  <canvas id="chart-by-country" class="w-100" height="220"></canvas>
                </div>
              </div>
            </div>
            
            <div class="col-12 col-lg-6 col-xl-6">
              <div class="card bg-body-tertiary border-0 shadow-sm h-100">
                <div class="card-body">
                  <h6 class="card-subtitle mb-3 text-muted text-uppercase" style="letter-spacing: 0.05em">By device</h6>
                  <canvas id="chart-by-device" class="w-100" height="220"></canvas>
                </div>
              </div>
            </div>
            
            <div class="col-12 col-lg-6 col-xl-6">
              <div class="card bg-body-tertiary border-0 shadow-sm h-100">
                <div class="card-body">
                  <h6 class="card-subtitle mb-3 text-muted text-uppercase" style="letter-spacing: 0.05em">By referrer</h6>
                  <canvas id="chart-by-referrer" class="w-100" height="220"></canvas>
                </div>
              </div>
            </div>
          </div>
          
          <div class="mt-4 mt-xl-5 text-end">
             <a href="#" id="export-link" class="btn btn-outline-secondary">Export CSV</a>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/dashboard.js"></script>
  <script>
    if (guardPage()) initDashboard();
  </script>
</body>
</html>
